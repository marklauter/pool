name: .NET Test

on:
  push:
    branches: [ "main" ]
    paths: [ "src/**", "tests/**", "Directory.Build.props", "Directory.Packages.props", ".github/workflows/**" ]
  pull_request:
    branches: [ "main" ]
    paths: [ "src/**", "tests/**", "Directory.Build.props", "Directory.Packages.props", ".github/workflows/**" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Verify formatting
      run: dotnet format "Pool.slnx" --severity info --verify-no-changes

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: [ Debug, Release ]
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v5
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Build
      run: dotnet build "tests/Pool.Tests/Pool.Tests.csproj" -c ${{ matrix.configuration }}

    - name: Test
      run: dotnet test "tests/Pool.Tests/Pool.Tests.csproj" -c ${{ matrix.configuration }} --no-build

    - name: Upload coverage report
      if: always() && matrix.configuration == 'Debug'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-cobertura
        path: tests/Pool.Tests/coverage.cobertura.xml
        if-no-files-found: error
